name: Release WebCraft

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            deps: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            deps: echo "no system deps"
          - platform: macos-latest
            target: aarch64-apple-darwin
            deps: echo "no system deps"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: ${{ matrix.deps }}

      - name: Install dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'WebCraft Studio v__VERSION__'
          releaseBody: 'Descarga directa. Sin compilar.'
          releaseDraft: true
          prerelease: false
